<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ - GDU TechStore</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header-area site-header">
        <div class="container">
            <nav class="navbar site-nav">
                <div class="logo brand-logo">
                    <a href="index.html"><img src="hinhanhrapphim/logo.png" alt="Logo"></a>
                </div>
                <ul class="menu nav-list" id="nav-menu">
                    <li class="menu-items"><a href="index.html">Trang chủ</a></li>
                    <li class="menu-items"><a href="movies.html">Danh sách phim</a></li>
                    <li class="menu-items"><a href="contact.html" class="active">Liên hệ</a></li>
                </ul>
                <div class="header-actions header-tools">
                    <a href="cart.html" class="cart-icon" title="Giỏ vé">🛒 Vé: <span id="cart-count">0</span></a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container py-40">
        <h2 class="section-title">Liên hệ với chúng tôi</h2>
        <div class="contact-form-container">
            <form id="contact-form" class="contact-form">
                <div class="form-group">
                    <label for="fullname">Họ tên *</label>
                    <input type="text" id="fullname" placeholder="Nhập họ tên...">
                    <span class="error-msg" id="err-fullname"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="text" id="email" placeholder="example@gmail.com">
                    <span class="error-msg" id="err-email"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại *</label>
                    <input type="text" id="phone" placeholder="Nhập số điện thoại (vd: 0912345678)">
                    <span class="error-msg" id="err-phone"></span>
                </div>

                <div class="form-group">
                    <label for="message">Nội dung</label>
                    <textarea id="message" rows="5" placeholder="Bạn cần hỗ trợ gì?"></textarea>
                </div>

                <button type="submit" class="datve-btn">Gửi Liên Hệ</button>
                <div id="success-msg" class="success-msg hide">Cảm ơn bạn! Thông tin đã được gửi thành công.</div>
            </form>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer-area site-footer">
        <div class="container footer-container footer-layout">
            <div class="footer-left footer-brand">
                <img src="hinhanhrapphim/logoMoveek.png" alt="Logo hãng">
            </div>

            <div class="footer-content footer-info">
                <h1>&copy; 2026 Quản Lí Đặt vé xem phim.</h1>
                <p>Số ĐKKD: 0315367026</p>
                <p>Địa chỉ: 33 Nguyễn Trung Trực, P.5, Q. Bình Thạnh, Tp. Hồ Chí Minh</p>
                <p>Về chúng tôi · Chính sách bảo mật · Hỗ trợ · Liên hệ</p>
            </div>

            <div class="footer-right partner-list">
                <div class="doitac"><img src="hinhanhrapphim/momo.png" alt="Momo"></div>
                <div class="doitac"><img src="hinhanhrapphim/BetaCinemas.jpg" alt="Beta Cinemas"></div>
                <div class="doitac"><img src="hinhanhrapphim/cinemax.jpg" alt="Cinemax"></div>
                <div class="doitac"><img src="hinhanhrapphim/CineStar.png" alt="CineStar"></div>
                <div class="doitac"><img src="hinhanhrapphim/DDC.png" alt="DDC"></div>
                <div class="doitac"><img src="hinhanhrapphim/MegaGS.png" alt="MegaGS"></div>
                <div class="doitac"><img src="hinhanhrapphim/Payoo.png" alt="Payoo"></div>
                <div class="doitac"><img src="hinhanhrapphim/TouchCinema.jpg" alt="Touch Cinema"></div>
                <div class="doitac"><img src="hinhanhrapphim/ZaloPay.png" alt="ZaloPay"></div>
            </div>
        </div>

        <!-- BẢN ĐỒ -->
        <div class="container footer-map" style="margin-top: 30px;">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.261298586071!2d106.6908581750893!3d10.791285389358245!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x317528cc29d5b51b%3A0xe54cf1b98a12dc88!2s33%20Nguy%E1%BB%85n%20Trung%20Tr%E1%BB%B1c%2C%20Ph%C6%B0%E1%BB%9Dng%205%2C%20B%C3%ACnh%20Th%E1%BA%A1nh%2C%20H%E1%BB%93%20Ch%C3%AD%20Minh!5e0!3m2!1svi!2s!4v1713508492023!5m2!1svi!2s"
                width="100%" height="250" style="border:0; border-radius: 8px;" allowfullscreen=""
                loading="lazy"></iframe>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/contact.js"></script>
</body>

</html>
